<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maintenance in Progress</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e4e7eb);
            color: #333;
        }

        .maintenance-card {
            background: white;
            padding: 3rem 2.5rem;
            max-width: 520px;
            width: 90%;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .maintenance-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            margin: 0 0 1rem;
            font-size: 1.75rem;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
            color: #555;
        }

        .subtext {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="maintenance-card">
        <div class="maintenance-icon">🚧</div>
        <h1>We’re Performing Maintenance</h1>
        <p>
            Our site is temporarily unavailable while we make improvements.
            Please check back in a few weeks.
        </p>

        <div class="subtext">
            Thank you for your patience.
        </div>
    </div>
</body>
</html>
